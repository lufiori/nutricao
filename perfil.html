<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NutriVida - Perfil</title><link rel="stylesheet" href="app.css"></head><body><header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html"><span class="logo">🌿</span>NutriVida</a><nav class="desktop-nav"><a class="navbtn" href="index.html">Hoje</a><a class="navbtn" href="alimentos.html">Alimentos</a><a class="navbtn" href="receitas.html">Receitas</a><a class="navbtn active" href="perfil.html">Perfil</a></nav></div></header><main class="app"><section class="card soft"><h1 class="title">Perfil e metas</h1><p class="subtitle">Ajuste as metas diárias usadas no resumo e no quadro “Falta no seu dia”.</p></section><section class="card"><div class="formrow"><div class="field"><label>Calorias</label><input id="kcal" type="number"></div><div class="field"><label>Proteínas (g)</label><input id="proteina" type="number"></div><div class="field"><label>Carboidratos (g)</label><input id="carbo" type="number"></div><div class="field"><label>Gorduras (g)</label><input id="gordura" type="number"></div><div class="field"><label>Fibras (g)</label><input id="fibra" type="number"></div><div class="field"><label>Cálcio (mg)</label><input id="calcio" type="number"></div><div class="field"><label>Ferro (mg)</label><input id="ferro" type="number"></div><div class="field"><label>Vitamina C (mg)</label><input id="vitc" type="number"></div></div><button class="primary" onclick="saveProfile()">Salvar metas</button></section></main><nav class="bottom-nav"><div class="bottom-nav-inner"><button onclick="location.href='index.html'">🏠<br>Hoje</button><button onclick="location.href='alimentos.html'">🍎<br>Alimentos</button><button onclick="location.href='receitas.html'">📖<br>Receitas</button></div></nav><script src="app.js"></script><script>
function loadProfile(){Object.assign(NV.targets,NV.profile.targets||{});Object.keys(NV.targets).forEach(k=>{const el=document.getElementById(k);if(el)el.value=NV.targets[k]})}
function saveProfile(){const targets={};Object.keys(NV.targets).forEach(k=>{const el=document.getElementById(k);if(el)targets[k]=Number(el.value)||NV.targets[k]});NV.profile={targets};alert('Metas salvas.');}
loadProfile()</script></body></html>
