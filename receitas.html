<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Receitas rápidas</title><style>
:root{
  --bg:#f6f7f9;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;
  --primary:#2f8f46;--primary-soft:#eaf6ed;--blue-soft:#eef4ff;--amber-soft:#fff8eb;
  --red-soft:#fff1f2;--violet-soft:#f5f3ff;--shadow:0 10px 24px rgba(15,23,42,.06);--radius:18px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
.topbar-inner{max-width:1500px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand h1{margin:0;color:var(--primary);font-size:23px}
.brand div{color:var(--muted);font-size:14px;margin-top:3px}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{padding:10px 13px;border:1px solid var(--line);border-radius:12px;color:var(--text);text-decoration:none;background:#fff;font-size:14px;font-weight:700}
.nav a.active,.nav a:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.page{max-width:1500px;margin:18px auto;padding:0 18px 28px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
label,.label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block}
input,select{width:100%;padding:12px 13px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-size:15px;color:var(--text)}
button,.btn,.btn-outline,.btn-soft,.btn-danger{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:#fff;cursor:pointer;font-size:14px}
.btn{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-soft{background:var(--primary-soft);color:var(--primary);border-color:#b7e2c1}
.btn-danger{color:#b91c1c;border-color:#fecaca}
.muted{color:var(--muted)}
.pill{display:inline-block;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:999px;padding:4px 8px;font-size:12px;color:#374151}
.metric{border:1px solid var(--line);border-radius:14px;padding:14px}
.metric h4{margin:0;color:var(--muted);font-size:13px}
.metric .big{font-size:24px;font-weight:800;margin-top:18px}
.green-soft{background:var(--primary-soft)}.blue-soft{background:var(--blue-soft)}.amber-soft{background:var(--amber-soft)}.red-soft{background:var(--red-soft)}.violet-soft{background:var(--violet-soft)}
.inline{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.status{display:none;padding:12px 14px;border-radius:12px;font-size:14px;margin-top:12px}
.status.ok{display:block;background:#ecfdf5;border:1px solid #86efac;color:#166534}
.status.error{display:block;background:#fff7ed;border:1px solid #fdba74;color:#9a3412}
table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}
th,td{padding:10px;border-bottom:1px solid #edf0f2;text-align:left;vertical-align:top}
th{background:#fafafa}.table-wrap{border:1px solid var(--line);border-radius:14px;overflow:auto;background:#fff}
.food-list{border:1px solid var(--line);border-radius:14px;background:#fff;overflow:auto;max-height:620px;margin-top:12px}
.food-item{padding:12px;border-bottom:1px solid #edf0f2;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.food-item:last-child{border-bottom:none}.food-name{font-weight:800}.food-sub{font-size:13px;color:var(--muted);margin-top:4px}
.meal-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.meal-tab{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px;cursor:pointer;text-align:center;font-size:14px}
.meal-tab.active{background:var(--primary-soft);border-color:#b7e2c1;color:var(--primary);font-weight:800}
.macro-bar{height:12px;background:#e5e7eb;border-radius:999px;overflow:hidden}.macro-fill{height:100%;background:var(--primary);width:0%}
.footer{text-align:center;color:var(--muted);padding:0 16px 24px;font-size:12px}
@media(max-width:1000px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.meal-tabs{grid-template-columns:1fr 1fr}.topbar-inner{align-items:flex-start}}
</style></head><body><script>
const refeicoes=[
{id:"cafe_da_manha",nome:"Café da manhã"},{id:"almoco",nome:"Almoço"},{id:"jantar",nome:"Jantar"},{id:"lanches",nome:"Lanches"},{id:"ceia",nome:"Ceia"}
];
const objetivos=[
{id:"perder_peso",nome:"Perder peso",ajuste:-450,protKg:2.0,gordKg:0.8},
{id:"manter_peso",nome:"Manter peso",ajuste:0,protKg:1.6,gordKg:0.9},
{id:"ganhar_massa",nome:"Ganhar massa",ajuste:300,protKg:2.2,gordKg:1.0}
];
let baseAtual=[]; let alimentoSelecionado=null; let refeicaoAtiva="almoco";
const hoje=new Date().toISOString().slice(0,10);
function el(id){return document.getElementById(id)}
function num(v){const x=Number(v);return Number.isFinite(x)?x:0}
function fmt(v,c=1){const x=Number(v);if(!Number.isFinite(x))return "—";return x.toLocaleString("pt-BR",{minimumFractionDigits:c,maximumFractionDigits:c})}
function fmt0(v){const x=Number(v);return Number.isFinite(x)?Math.round(x).toLocaleString("pt-BR"):"0"}
function getGrupo(a){return a?.grupo||a?.grupo_alimento||a?.descricao_grupo||a?.categoria||"Não informado"}
function getDiario(){try{return JSON.parse(localStorage.getItem("nutritaco_multi_diario")||"{}")}catch(e){return {}}}
function setDiario(d){localStorage.setItem("nutritaco_multi_diario",JSON.stringify(d))}
function getData(){return (el("dataDiario")?.value)||hoje}
function getDia(){
  const d=getData(); const diario=getDiario();
  if(!diario[d]) diario[d]={};
  refeicoes.forEach(r=>{if(!Array.isArray(diario[d][r.id])) diario[d][r.id]=[]});
  setDiario(diario); return diario[d];
}
function saveDia(dia){const d=getData();const diario=getDiario();diario[d]=dia;setDiario(diario)}
function getPerfil(){
  try{return JSON.parse(localStorage.getItem("nutritaco_multi_perfil")||"{}")}catch(e){return {}}
}
function setPerfil(p){localStorage.setItem("nutritaco_multi_perfil",JSON.stringify(p))}
function getMetas(){
  const p=getPerfil();
  return {kcal:num(p.metaKcal)||2000,proteina:num(p.metaProteina)||120,carbo:num(p.metaCarbo)||250,lipideos:num(p.metaLipideos)||70}
}
function totaisItens(itens){
  return itens.reduce((acc,it)=>{
    acc.kcal+=num(it.kcal);acc.proteina+=num(it.proteina_g);acc.carbo+=num(it.carboidrato_g);acc.lipideos+=num(it.lipideos_g);
    acc.colesterol+=num(it.colesterol_mg);acc.fibra+=num(it.fibra_alimentar_g);acc.calcio+=num(it.calcio_mg);acc.ferro+=num(it.ferro_mg);acc.vitc+=num(it.vitamina_c_mg);
    acc.sodio+=num(it.sodio_mg);acc.potassio+=num(it.potassio_mg);acc.magnesio+=num(it.magnesio_mg);acc.zinco+=num(it.zinco_mg);
    return acc;
  },{kcal:0,proteina:0,carbo:0,lipideos:0,colesterol:0,fibra:0,calcio:0,ferro:0,vitc:0,sodio:0,potassio:0,magnesio:0,zinco:0})
}
function totaisDia(){
 const dia=getDia();let todos=[];refeicoes.forEach(r=>todos=todos.concat(dia[r.id]||[]));return totaisItens(todos)
}
async function carregarBase(){
  try{
    const res=await fetch("taco_completo.json"); if(!res.ok) throw new Error("base");
    const data=await res.json(); baseAtual=Array.isArray(data)?data:(data.alimentos||[]);
    return true;
  }catch(e){
    const s=el("statusBase"); if(s){s.className="status error";s.textContent="Não consegui carregar taco_completo.json. Deixe o JSON na mesma pasta dos HTMLs e abra pelo servidor."}
    return false;
  }
}
function itemFromAlimento(a,g){
 const f=g/100;
 return {
  nome:a.descricao_alimento,grupo:getGrupo(a),quantidade_g:g,
  kcal:num(a.energia_kcal)*f,proteina_g:num(a.proteina_g)*f,carboidrato_g:num(a.carboidrato_g)*f,lipideos_g:num(a.lipideos_g)*f,
  colesterol_mg:num(a.colesterol_mg)*f,fibra_alimentar_g:num(a.fibra_alimentar_g)*f,
  sodio_mg:num(a.sodio_mg)*f,potassio_mg:num(a.potassio_mg)*f,calcio_mg:num(a.calcio_mg)*f,ferro_mg:num(a.ferro_mg)*f,magnesio_mg:num(a.magnesio_mg)*f,zinco_mg:num(a.zinco_mg)*f,
  vitamina_c_mg:num(a.vitamina_c_mg)*f,retinol_mcg:num(a.retinol_mcg||a.rae_mcg||a.re_mcg)*f,tiamina_mg:num(a.tiamina_mg)*f,riboflavina_mg:num(a.riboflavina_mg)*f,piridoxina_mg:num(a.piridoxina_mg)*f,niacina_mg:num(a.niacina_mg)*f
 }
}
function adicionarItemRefeicao(refeicao,item){
 const dia=getDia(); dia[refeicao].push(item); saveDia(dia);
}
function calcularPerfil(){
 const p=getPerfil(); const peso=num(p.pesoKg)||80, altura=num(p.alturaCm)||175, idade=num(p.idade)||30, sexo=p.sexo||"masculino", atividade=num(p.atividade)||1.55;
 const imc=peso/((altura/100)**2);
 const tmb=sexo==="masculino"?10*peso+6.25*altura-5*idade+5:10*peso+6.25*altura-5*idade-161;
 const gasto=tmb*atividade; const obj=objetivos.find(o=>o.id===(p.objetivo||"manter_peso"))||objetivos[1];
 const metaKcal=Math.max(1200,gasto+obj.ajuste), metaProteina=peso*obj.protKg, metaLipideos=peso*obj.gordKg, metaCarbo=Math.max(0,(metaKcal-metaProteina*4-metaLipideos*9)/4);
 return {imc,gasto,obj,metaKcal,metaProteina,metaLipideos,metaCarbo}
}
function header(active){
 return `<div class="topbar"><div class="topbar-inner"><div class="brand"><h1>NutriTACO</h1><div>Controle alimentar familiar, colesterol e base TACO</div></div><nav class="nav">
 <a class="${active==='index'?'active':''}" href="index.html">Início</a>
 <a class="${active==='diario'?'active':''}" href="diario.html">Diário alimentar</a>
 <a class="${active==='alimentos'?'active':''}" href="alimentos.html">Alimentos</a>
 <a class="${active==='receitas'?'active':''}" href="receitas.html">Receitas rápidas</a>
 <a class="${active==='necessidades'?'active':''}" href="necessidades.html">Necessidades</a>
 </nav></div></div>`
}
</script><script>document.write(header("receitas"));</script><div class="page"><div class="card"><h2>Receitas rápidas</h2><p class="muted">Medidas caseiras estimadas. O app lança os ingredientes no diário automaticamente.</p><div class="grid-3"><div><label>Buscar</label><input id="busca" oninput="renderReceitas()"></div><div><label>Refeição</label><select id="refeicao"></select></div><div><label>Porções</label><select id="porcoes" onchange="renderReceitas()"><option value="0.5">Meia</option><option value="1" selected>1 porção</option><option value="1.5">1,5</option><option value="2">2</option></select></div></div></div><div class="grid-3" id="lista"></div></div><script>
const receitas=[
{nome:"Arroz com feijão",cat:"Almoço/Jantar",ings:[["Arroz - tipo 1 - cozido","4 colheres de sopa de arroz cozido",100],["Feijão - carioca - cozido","1 concha pequena de feijão",86]]},
{nome:"Mingau de aveia",cat:"Café/Lanche",ings:[["Aveia - flocos - crua","3 colheres de sopa de aveia",30],["Leite - de vaca - desnatado - UHT","1 copo de leite",200],["Banana - prata - crua","1 banana média",86]]},
{nome:"Omelete simples",cat:"Café/Almoço",ings:[["Ovo - de galinha - inteiro - cozido/10minutos","2 ovos",100],["Tomate - com semente - cru","2 colheres de sopa de tomate",40],["Cebola - crua","1 colher de sopa de cebola",15]]},
{nome:"Frango com arroz e salada",cat:"Almoço/Jantar",ings:[["Frango - peito - sem pele - grelhado","1 filé médio",100],["Arroz - tipo 1 - cozido","3 colheres de sopa",75],["Alface - crespa - crua","3 folhas",45],["Tomate - com semente - cru","1 tomate pequeno",80]]},
{nome:"Iogurte com banana e aveia",cat:"Café/Lanche",ings:[["Iogurte - natural","1 pote",170],["Banana - prata - crua","1 banana média",86],["Aveia - flocos - crua","1 colher de sopa",10]]},
{nome:"Salada básica",cat:"Almoço/Jantar",ings:[["Alface - crespa - crua","3 folhas",45],["Tomate - com semente - cru","1 tomate pequeno",80],["Cenoura - crua","2 colheres de sopa ralada",30]]}
];
function findFood(nome){return baseAtual.find(a=>String(a.descricao_alimento).toLowerCase()===nome.toLowerCase())||baseAtual.find(a=>String(a.descricao_alimento).toLowerCase().includes(nome.split(" - ")[0].toLowerCase()))}
function calc(r,por=1){let t={kcal:0,proteina:0,carbo:0,lipideos:0,fibra:0,colesterol:0};r.ings.forEach(i=>{const a=findFood(i[0]);if(!a)return;const it=itemFromAlimento(a,i[2]*por);t.kcal+=it.kcal;t.proteina+=it.proteina_g;t.carbo+=it.carboidrato_g;t.lipideos+=it.lipideos_g;t.fibra+=it.fibra_alimentar_g;t.colesterol+=it.colesterol_mg});return t}
function renderReceitas(){const termo=(el("busca").value||"").toLowerCase(), por=Number(el("porcoes").value)||1;const lista=receitas.filter(r=>!termo||r.nome.toLowerCase().includes(termo)||r.cat.toLowerCase().includes(termo));el("lista").innerHTML=lista.map((r,idx)=>{const t=calc(r,por);return `<div class="card"><h3>${r.nome}</h3><div class="muted">${r.cat}</div><div class="inline" style="margin:10px 0"><span class="pill">${fmt(t.kcal,0)} kcal</span><span class="pill">P ${fmt(t.proteina,1)}g</span><span class="pill">Fibra ${fmt(t.fibra,1)}g</span><span class="pill">Col. ${fmt(t.colesterol,0)}mg</span></div><ul>${r.ings.map(i=>`<li>${i[1]} <span class="muted">(${fmt0(i[2]*por)}g)</span></li>`).join("")}</ul><button class="btn" onclick="addReceita(${idx})">Adicionar receita</button></div>`}).join("")}
function addReceita(idx){const r=receitas[idx], por=Number(el("porcoes").value)||1, ref=el("refeicao").value;let n=0;r.ings.forEach(i=>{const a=findFood(i[0]);if(a){const it=itemFromAlimento(a,i[2]*por);it.origem_receita=r.nome;it.medida_caseira=i[1];adicionarItemRefeicao(ref,it);n++}});alert(`Receita adicionada (${n} itens).`)}
document.addEventListener("DOMContentLoaded",async()=>{el("refeicao").innerHTML=refeicoes.map(r=>`<option value="${r.id}">${r.nome}</option>`).join("");await carregarBase();renderReceitas();});
</script><div class="footer">Fonte: TACO</div></body></html>
