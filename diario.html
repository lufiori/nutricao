<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriVida - Diário Alimentar</title>
<style>
:root {
  --bg: #f7f8fa; --card: #fff; --text: #1f2937; --muted: #6b7280; --border: #e5e7eb;
  --primary: #2f855a; --primary-dark: #276749; --soft-green: #e8f5ee; --danger: #dc2626;
  --shadow: 0 8px 22px rgba(15, 23, 42, .08); --radius: 18px;
}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(15,23,42,.04)}
.topbar{max-width:1220px;margin:0 auto;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;align-items:center;gap:10px;min-width:210px}.brand-icon{width:40px;height:40px;border-radius:14px;background:var(--soft-green);display:grid;place-items:center;font-size:23px}
.brand h1{font-size:20px;margin:0;line-height:1.1}.brand small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}nav a{text-decoration:none;border:1px solid var(--border);background:#fff;color:var(--text);padding:9px 12px;border-radius:999px;cursor:pointer;font-weight:700;font-size:13px}
nav a.active{background:var(--primary);color:#fff;border-color:var(--primary)}
main{max-width:1220px;margin:0 auto;padding:24px 18px 60px}.hero{background:linear-gradient(135deg,#fff,#edf7f1);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.hero h2{margin:0 0 8px;font-size:28px}.hero p{margin:0;color:var(--muted);line-height:1.5}.notice{margin-top:12px;padding:12px;border-radius:16px;background:#fff;border:1px solid var(--border);color:var(--muted);font-size:13px;line-height:1.45}
.status-pill{display:inline-flex;align-items:center;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid var(--border);font-size:12px;color:var(--muted);margin-top:10px}
.toolbar,.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.toolbar{padding:16px;margin-bottom:18px;display:grid;grid-template-columns:1.4fr 1fr auto;gap:12px;align-items:end}
.field{position:relative}.field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:14px;font-size:14px;background:#fff;color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(47,133,90,.13)}
button{font-family:inherit}.btn{border:0;background:var(--primary);color:#fff;padding:11px 14px;border-radius:14px;cursor:pointer;font-weight:700;font-size:14px;transition:.18s ease;white-space:nowrap}
.btn:hover{background:var(--primary-dark);transform:translateY(-1px)}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--border)}.btn.secondary:hover{background:#f9fafb}.btn.danger{background:#fff;color:var(--danger);border:1px solid #fecaca}.btn.danger:hover{background:#fff1f2}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 410px;gap:18px;align-items:start}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.recipe-card{padding:16px;display:flex;flex-direction:column;gap:13px;min-height:246px}.recipe-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.recipe-title{margin:0;font-size:19px}
.badge{display:inline-flex;align-items:center;padding:6px 9px;border-radius:999px;background:var(--soft-green);color:#276749;font-size:12px;font-weight:800;white-space:nowrap}.badge.cafe{background:#fff7ed;color:#9a3412}.badge.almoco{background:#eef6ff;color:#1d4ed8}.badge.jantar{background:#f5f3ff;color:#6d28d9}.badge.lanche{background:#fdf2f8;color:#be185d}
.recipe-desc{color:var(--muted);line-height:1.45;font-size:14px;margin:0;min-height:42px}.meta-row{display:flex;gap:8px;flex-wrap:wrap}.meta-pill{background:#f9fafb;border:1px solid var(--border);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:12px;font-weight:700}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.macro{background:#f9fafb;border:1px solid var(--border);border-radius:14px;padding:9px;text-align:center}.macro strong{display:block;font-size:14px}.macro span{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}.side-panel{position:sticky;top:92px;padding:16px}.empty{color:var(--muted);background:#f9fafb;border:1px dashed #cbd5e1;border-radius:16px;padding:18px;line-height:1.5}
.detail-title{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}.detail-title h3{margin:0}
.ingredients{list-style:none;margin:12px 0;padding:0;display:grid;gap:8px}.ingredients li{padding:10px;border:1px solid var(--border);border-radius:14px;background:#f9fafb;display:flex;justify-content:space-between;gap:10px;font-size:14px}.ingredients small{display:block;color:var(--muted);margin-top:3px}
.nutrition-table{width:100%;border-collapse:collapse;margin-top:12px;overflow:hidden;border-radius:14px;font-size:14px}.nutrition-table th,.nutrition-table td{border-bottom:1px solid var(--border);padding:9px;text-align:left}.nutrition-table th{background:#f9fafb;color:var(--muted);font-size:12px}
.form-panel{margin-top:18px;padding:16px}.form-panel h3{margin:0 0 10px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}
.ingredient-editor{display:grid;gap:10px;margin-top:8px}.ingredient-line{display:grid;grid-template-columns:minmax(180px,1.5fr) 90px 120px 90px 42px;gap:8px;align-items:end;padding:10px;border:1px solid var(--border);border-radius:16px;background:#fbfbfc;position:relative}
.suggestions{position:absolute;left:10px;right:10px;top:72px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 18px 35px rgba(15,23,42,.18);z-index:9999;max-height:300px;overflow-y:auto;display:none}
.suggestions button{width:100%;padding:12px 14px;border:0;background:#fff;text-align:left;cursor:pointer;border-bottom:1px solid #f1f5f9;color:var(--text);font-size:14px;line-height:1.4}.suggestions button:hover{background:#f0fdf4}.suggestions small{display:block;color:var(--muted);margin-top:4px;font-size:12px}
.calc-box{margin-top:14px;padding:14px;border-radius:18px;background:#f9fafb;border:1px solid var(--border)}.calc-box h4{margin:0 0 10px}.small-note{color:var(--muted);font-size:12px;line-height:1.45}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.35);display:none;align-items:center;justify-content:center;padding:18px;z-index:10000}.modal{background:#fff;border-radius:22px;border:1px solid var(--border);box-shadow:0 24px 60px rgba(15,23,42,.25);max-width:460px;width:100%;padding:18px}.modal h3{margin:0 0 8px}.meal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.meal-btn{border:1px solid var(--border);background:#fff;border-radius:16px;padding:14px;cursor:pointer;text-align:left;font-weight:800}.meal-btn:hover{border-color:var(--primary);background:#f0fdf4}
.day-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.day-tabs button{border:1px solid var(--border);background:#fff;border-radius:999px;padding:9px 12px;font-weight:800;cursor:pointer}.day-tabs button.active{background:var(--primary);border-color:var(--primary);color:#fff}
.meal-section{padding:16px;margin-bottom:16px}.meal-section h3{margin:0 0 10px}.diary-item{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px;background:#f9fafb;border:1px solid var(--border);border-radius:16px;margin-top:8px}.summary-box{padding:16px}
@media(max-width:980px){.toolbar{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}.side-panel{position:static}.grid-2{grid-template-columns:1fr}}
@media(max-width:700px){.topbar{align-items:flex-start;flex-direction:column}nav{width:100%;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px}nav a{flex:0 0 auto}main{padding:18px 12px 50px}.hero{padding:18px}.hero h2{font-size:23px}.toolbar{grid-template-columns:1fr;padding:13px}.macro-row{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.ingredient-line{grid-template-columns:1fr}.suggestions{position:static;margin-top:8px}.btn{width:100%}.actions{width:100%}.actions .btn{flex:1 1 100%}.meal-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="topbar"><div class="brand"><div class="brand-icon">🥗</div><div><h1>NutriVida</h1><small>Diário alimentar real</small></div></div>
<nav>
  <a href="index.html">Diário</a>
  <a href="alimentos.html">Alimentos</a>
  <a href="receitas.html" class="active">Receitas</a>
  <a href="favoritos.html">Favoritos</a>
  <a href="perfil.html">Perfil</a>
</nav>
</div></header>
<main>
<section class="hero"><h2>📘 Diário alimentar</h2><p>Aqui aparecem as receitas adicionadas pela página de receitas, separadas por refeição e data.</p></section>
<section class="toolbar"><div class="field"><label>Data do diário</label><input id="dataDiario" type="date"></div><div class="field"><label>Filtrar refeição</label><select id="filtroRefeicao"><option value="">Todas</option><option value="cafe">Café da manhã</option><option value="almoco">Almoço</option><option value="jantar">Jantar</option><option value="lanche">Lanche</option></select></div><button class="btn secondary" onclick="limparDiarioDia()">Limpar dia</button></section>
<section class="layout"><div><div class="day-tabs"><button onclick="mudarData(-1)">← Dia anterior</button><button class="active" onclick="irHoje()">Hoje</button><button onclick="mudarData(1)">Próximo dia →</button></div><div id="diarioConteudo"></div></div><aside class="card side-panel"><h3>Resumo do dia</h3><div id="resumoDia" class="summary-box"></div></aside></section>
</main>
<script>
const RECEITAS_KEY = "nutrividareceitas_taco_real_v1";
const DIARIO_KEY = "nutrividadiario_real_v1";

function textoBusca(texto){return String(texto||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();}
function numero(valor){if(valor===null||valor===undefined||valor==="")return 0;if(typeof valor==="number")return isNaN(valor)?0:valor;const n=Number(String(valor).replace(",",".").replace(/[^\d.-]/g,""));return isNaN(n)?0:n;}
function arred(n){return Math.round((Number(n)||0)*10)/10;}
function fmt(valor){const n=arred(valor);return Number.isInteger(n)?String(n):String(n).replace(".",",");}
function gerarId(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random());}
function escapeHtml(texto){return String(texto??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function escapeAttr(texto){return escapeHtml(texto).replaceAll("`","&#096;");}
function escapeJs(texto){return String(texto).replaceAll("\\","\\\\").replaceAll("'","\\'");}
function dataHoje(){return new Date().toISOString().slice(0,10);}
function dataBR(iso){const [a,m,d]=iso.split("-");return `${d}/${m}/${a}`;}
function refeicaoLabel(refeicao){return {cafe:"Café da manhã",almoco:"Almoço",jantar:"Jantar",lanche:"Lanche"}[refeicao]||refeicao;}
function carregarDiario(){try{return JSON.parse(localStorage.getItem(DIARIO_KEY))||[]}catch(e){return[]}}
function salvarDiario(diario){localStorage.setItem(DIARIO_KEY,JSON.stringify(diario));}
function tabelaNutrientes(n){return `<table class="nutrition-table"><thead><tr><th>Nutriente</th><th>Total</th></tr></thead><tbody><tr><td>Energia</td><td>${fmt(n.kcal)} kcal</td></tr><tr><td>Proteínas</td><td>${fmt(n.proteina)} g</td></tr><tr><td>Carboidratos</td><td>${fmt(n.carbo)} g</td></tr><tr><td>Gorduras</td><td>${fmt(n.gordura)} g</td></tr><tr><td>Fibras</td><td>${fmt(n.fibra)} g</td></tr><tr><td>Cálcio</td><td>${fmt(n.calcio)} mg</td></tr><tr><td>Ferro</td><td>${fmt(n.ferro)} mg</td></tr><tr><td>Sódio</td><td>${fmt(n.sodio)} mg</td></tr><tr><td>Colesterol</td><td>${fmt(n.colesterol)} mg</td></tr></tbody></table>`;}
function somarNutrientes(lista){const total={kcal:0,proteina:0,carbo:0,gordura:0,fibra:0,calcio:0,ferro:0,sodio:0,colesterol:0};lista.forEach(item=>{const n=item.nutrientes||{};total.kcal+=numero(n.kcal);total.proteina+=numero(n.proteina);total.carbo+=numero(n.carbo);total.gordura+=numero(n.gordura);total.fibra+=numero(n.fibra);total.calcio+=numero(n.calcio);total.ferro+=numero(n.ferro);total.sodio+=numero(n.sodio);total.colesterol+=numero(n.colesterol);});return total;}
</script>
<script>
const ordemRefeicoes=["cafe","almoco","jantar","lanche"];
function renderDiario(){const data=document.getElementById("dataDiario").value||dataHoje();const filtro=document.getElementById("filtroRefeicao").value;const diario=carregarDiario();const itensDia=diario.filter(item=>item.data===data&&(!filtro||item.refeicao===filtro));const conteudo=document.getElementById("diarioConteudo");if(!itensDia.length){conteudo.innerHTML=`<div class="empty">Nenhum item lançado em ${dataBR(data)}.</div>`}else{conteudo.innerHTML=ordemRefeicoes.filter(ref=>!filtro||filtro===ref).map(ref=>{const itens=itensDia.filter(item=>item.refeicao===ref);return `<section class="card meal-section"><h3>${iconeRefeicao(ref)} ${refeicaoLabel(ref)}</h3>${itens.length?itens.map(item=>itemHtml(item)).join(""):'<div class="empty">Nada lançado nesta refeição.</div>'}</section>`}).join("")}renderResumo(data)}
function itemHtml(item){return `<div class="diary-item"><div><strong>${escapeHtml(item.nome)}</strong><br><span class="small-note">${fmt(item.nutrientes.kcal)} kcal • Prot. ${fmt(item.nutrientes.proteina)}g • Carbo ${fmt(item.nutrientes.carbo)}g • Gord. ${fmt(item.nutrientes.gordura)}g</span></div><button class="btn danger" onclick="removerItem('${item.id}')">Remover</button></div>`}
function renderResumo(data){const diario=carregarDiario();const itensDia=diario.filter(item=>item.data===data);const total=somarNutrientes(itensDia);document.getElementById("resumoDia").innerHTML=`<div class="macro-row" style="grid-template-columns:repeat(2,1fr);"><div class="macro"><strong>${fmt(total.kcal)}</strong><span>kcal</span></div><div class="macro"><strong>${fmt(total.proteina)}g</strong><span>proteína</span></div><div class="macro"><strong>${fmt(total.carbo)}g</strong><span>carbo</span></div><div class="macro"><strong>${fmt(total.gordura)}g</strong><span>gordura</span></div><div class="macro"><strong>${fmt(total.fibra)}g</strong><span>fibra</span></div><div class="macro"><strong>${fmt(total.colesterol)}mg</strong><span>colesterol</span></div></div><div style="margin-top:12px;">${tabelaNutrientes(total)}</div>`}
function removerItem(id){if(!confirm("Remover este item do diário?"))return;salvarDiario(carregarDiario().filter(item=>item.id!==id));renderDiario()}
function limparDiarioDia(){const data=document.getElementById("dataDiario").value||dataHoje();if(!confirm("Limpar todos os itens deste dia?"))return;salvarDiario(carregarDiario().filter(item=>item.data!==data));renderDiario()}
function mudarData(delta){const campo=document.getElementById("dataDiario");const d=new Date((campo.value||dataHoje())+"T00:00:00");d.setDate(d.getDate()+delta);campo.value=d.toISOString().slice(0,10);renderDiario()}
function irHoje(){document.getElementById("dataDiario").value=dataHoje();renderDiario()}
function iconeRefeicao(ref){return{cafe:"☕",almoco:"🍛",jantar:"🍽️",lanche:"🍌"}[ref]||"🍽️"}
document.getElementById("dataDiario").value=dataHoje();document.getElementById("dataDiario").addEventListener("change",renderDiario);document.getElementById("filtroRefeicao").addEventListener("change",renderDiario);renderDiario();
</script>
</body></html>
