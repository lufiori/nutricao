<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NutriVida - Alimentos TBCA</title>
<link rel="stylesheet" href="app.css">

<style>
/* LISTA MAIS BONITA */
.food-results-simple{
  display:grid;
  gap:18px;
}

.food-row-simple{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:20px;
  padding:16px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:center;
  cursor:pointer;
  transition:.18s ease;
}

/* TÍTULO MENOR */
.food-row-simple h3{
  margin:0;
  font-size:0.95rem;
  font-weight:600;
}

/* EFEITOS */
.food-row-simple:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(31,41,51,.12);
}

.food-row-simple:hover h3{
  text-decoration:underline;
}

/* OLHINHO */
.food-row-simple::after{
  content:"👁️";
  font-size:18px;
  opacity:.6;
}

.food-row-simple:hover::after{
  opacity:1;
}
</style>

</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html">🌿 NutriVida</a>
    <nav class="desktop-nav">
      <a class="navbtn" href="index.html">Hoje</a>
      <a class="navbtn active" href="alimentos.html">Alimentos</a>
      <a class="navbtn" href="receitas.html">Receitas</a>
      <a class="navbtn" href="favoritos.html">Favoritos</a>
      <a class="navbtn" href="perfil.html">Perfil</a>
    </nav>
  </div>
</header>

<main class="app">

<section class="card">
  <h1>Alimentos</h1>
  <p>Busca leve na base TBCA</p>
  <div id="tbcaStatus">Carregando...</div>
</section>

<section class="card">

  <input id="qFood" placeholder="Buscar alimento..." />
  <select id="groupFood"></select>
  <select id="typeFood"></select>
  <button onclick="buscar()">Buscar</button>

</section>

<section id="resultado" class="card">
  <div class="empty">Busque um alimento</div>
</section>

</main>

<script>
let alimentos = [];

async function carregar(){
  const r = await fetch("tbca_pronto.json");
  const j = await r.json();
  alimentos = j.alimentos;

  document.getElementById("tbcaStatus").innerText =
    "Base carregada: " + alimentos.length + " alimentos";
}

function buscar(){
  const q = document.getElementById("qFood").value.toLowerCase();

  const lista = alimentos.filter(a =>
    a.nome.toLowerCase().includes(q)
  ).slice(0,150);

  render(lista);
}

function render(lista){
  const el = document.getElementById("resultado");

  if(!lista.length){
    el.innerHTML = "Nada encontrado";
    return;
  }

  el.innerHTML = `
    <div class="food-results-simple">
      ${lista.map(a => `
        <div class="food-row-simple" onclick="alert('${a.nome}')">
          <div>
            <h3>${a.nome}</h3>
            <small>${a.grupo || ''}</small>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

carregar();
</script>

</body>
</html>
