<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NutriVida - Alimentos</title><link rel="stylesheet" href="app.css?v=menu4"></head><body><header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html"><span class="logo">🌿</span>NutriVida</a><nav class="desktop-nav"><a class="navbtn " href="index.html">Hoje</a><a class="navbtn active" href="alimentos.html">Alimentos</a><a class="navbtn " href="receitas.html">Receitas</a><a class="navbtn " href="favoritos.html">Favoritos</a><a class="navbtn " href="perfil.html">Perfil</a></nav></div></header><main class="app"><section class="card soft"><h1 class="title">Alimentos</h1><p class="subtitle">Busca rápida, favoritos e adição ao diário. A base tenta carregar automaticamente: taco.json, alimentos.json, dados_taco.json ou base_taco.json.</p></section><div class="toolbar"><input class="search" id="q" placeholder="Buscar alimento..." oninput="renderFoods()"><select class="search" id="grupo" onchange="renderFoods()"></select><select class="search" id="ordem" onchange="renderFoods()"><option value="nome">Ordenar por nome</option><option value="kcal">Energia</option><option value="proteina">Proteína</option><option value="fibra">Fibras</option><option value="calcio">Cálcio</option><option value="ferro">Ferro</option></select></div><div id="foodList" class="grid"></div></main><div class="more-menu" id="moreMenu"><a href="index.html">🏠 Hoje</a><a href="receitas.html">📖 Receitas</a><a href="favoritos.html">⭐ Favoritos</a><a href="perfil.html">⚙️ Perfil</a></div><nav class="bottom-nav"><div class="bottom-nav-inner"><button onclick="location.href='index.html'">🏠<br>Hoje</button><button class="active">🍎<br>Alimentos</button><button data-more onclick="openMore()">☰<br>Mais</button></div></nav><div class="modal-back" id="addModal"><div class="modal modal-add-simple"><div class="modal-head"><h2>Adicionar alimento</h2><button class="close" onclick="closeAdd()">Fechar</button></div><div class="field"><label>Busque e toque no alimento</label><input id="modalFoodSearch" class="search" placeholder="Digite arroz, frango, banana..." oninput="fillFoodSelect()"></div><div id="modalFoodResults" class="food-pick-list compact"></div><div id="modalSelectedBox" class="selected-food-box" style="display:none"></div><input type="hidden" id="modalFood"><div class="formrow simple-add-row"><div class="field"><label>Refeição</label><select id="modalMeal"><option>Café da manhã</option><option>Almoço</option><option>Lanche</option><option>Jantar</option></select></div><div class="field"><label>Quantidade em gramas</label><input id="modalGrams" type="number" value="100"></div></div><div class="quick-grams"><button type="button" onclick="setModalGrams(50)">50g</button><button type="button" onclick="setModalGrams(100)">100g</button><button type="button" onclick="setModalGrams(150)">150g</button><button type="button" onclick="setModalGrams(200)">200g</button></div><div class="toolbar"><button id="modalAddBtn" class="primary" onclick="submitAdd();renderFoods()" disabled>Escolha um alimento</button></div></div></div><script src="app.js?v=menu4"></script><script>
function fillGroups(){const g=document.getElementById('grupo');const grupos=['Todos',...new Set(NV.foods.map(f=>f.grupo).filter(Boolean))].sort();g.innerHTML=grupos.map(x=>`<option>${x}</option>`).join('')}
function renderFoods(){
 const q=document.getElementById('q').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
 const grupo=document.getElementById('grupo').value;
 const ordem=document.getElementById('ordem').value;
 let arr=NV.foods.filter(f=>(!q||`${f.nome} ${f.grupo}`.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q))&&(grupo==='Todos'||!grupo||f.grupo===grupo));
 arr.sort((a,b)=>ordem==='nome'?a.nome.localeCompare(b.nome):num(b[ordem])-num(a[ordem]));
 document.getElementById('foodList').innerHTML=arr.map(f=>`<div class="food-card clickable" onclick="openFoodDetail('${f.id}')"><div><h3>${f.nome}</h3><div class="food-meta"><span>${f.grupo}</span><span>${fmt(f.kcal)} kcal</span><span>${fmt(f.proteina,1)}g proteína</span><span>${fmt(f.fibra,1)}g fibras</span></div><small class="hint">Clique para ver ficha completa e gráfico</small></div><div class="toolbar"><button class="ghost" onclick="event.stopPropagation();toggleFav('${f.id}')">${NV.favs.includes(String(f.id))?'★':'☆'}</button><button class="primary" onclick="event.stopPropagation();openAdd('Almoço','${f.id}')">Adicionar</button></div></div>`).join('')||'<div class="empty">Nenhum alimento encontrado.</div>'
}
loadFoods().then(()=>{NV.foods=NV.foods.map(f=>({...f,id:String(f.id)}));fillGroups();fillFoodSelect();renderFoods()})</script></body></html>
