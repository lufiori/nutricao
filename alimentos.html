<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NutriVida - Alimentos TBCA</title>
<link rel="stylesheet" href="app.css?v=tbca-pro">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html"><span class="logo">🌿</span>NutriVida</a>
    <nav class="desktop-nav">
      <a class="navbtn" href="index.html">Hoje</a>
      <a class="navbtn active" href="alimentos.html">Alimentos</a>
      <a class="navbtn" href="receitas.html">Receitas</a>
      <a class="navbtn" href="favoritos.html">Favoritos</a>
      <a class="navbtn" href="perfil.html">Perfil</a>
    </nav>
  </div>
</header>

<main class="app">
  <section class="card soft">
    <h1 class="title">Alimentos</h1>
    <p class="subtitle">
      Base TBCA normalizada para o NutriVida, com nutrientes por 100g e medidas caseiras.
    </p>
    <div class="pill" id="tbcaStatus" style="margin-top:12px">Carregando tbca_pronto.json...</div>
  </section>

  <div class="toolbar">
    <input class="search" id="qFood" placeholder="Buscar alimento na TBCA..." oninput="renderFoodsTBCA()">
    <select class="search" id="groupFood" onchange="renderFoodsTBCA()">
      <option value="">Todos os grupos</option>
    </select>
    <select class="search" id="sortFood" onchange="renderFoodsTBCA()">
      <option value="nome">Ordenar por nome</option>
      <option value="kcal">Menor caloria</option>
      <option value="proteina">Mais proteína</option>
      <option value="carbo">Mais carboidrato</option>
      <option value="fibra">Mais fibra</option>
      <option value="colesterol">Mais colesterol</option>
    </select>
    <button class="ghost" onclick="clearFoodFilters()">Limpar</button>
  </div>

  <section class="tbca-layout">
    <div id="foodList" class="food-grid"></div>
  </section>
</main>

<div id="foodDetailModal" class="tbca-detail-modal">
  <div class="tbca-detail-card">
    <div id="foodDetailModalContent"></div>
  </div>
</div>

<div id="addFoodModal" class="modal-tbca">
  <div class="modal-tbca-card">
    <h2 style="margin-top:0">Adicionar ao diário</h2>
    <p class="subtitle" id="modalFoodName"></p>

    <div class="grid grid2" style="margin-top:12px">
      <div>
        <label>Data</label>
        <input class="search" id="modalDate" type="date">
      </div>
      <div>
        <label>Medida</label>
        <select class="search" id="modalMeasure" onchange="updateModalPreview()"></select>
      </div>
    </div>

    <div style="margin-top:12px">
      <label>Quantidade</label>
      <input class="search" id="modalQty" type="number" min="0.1" step="0.1" value="1" oninput="updateModalPreview()">
    </div>

    <div id="modalPreview" class="card" style="box-shadow:none;background:#fbfcfb;margin-top:12px"></div>

    <div class="meal-grid">
      <button class="meal-choice" onclick="confirmAddTBCA('Café da manhã')">☕ Café da manhã</button>
      <button class="meal-choice" onclick="confirmAddTBCA('Almoço')">🍛 Almoço</button>
      <button class="meal-choice" onclick="confirmAddTBCA('Lanche')">🍌 Lanche</button>
      <button class="meal-choice" onclick="confirmAddTBCA('Jantar')">🍽️ Jantar</button>
    </div>

    <button class="ghost" onclick="closeAddFoodModal()">Cancelar</button>
  </div>
</div>

<script src="app.js?v=tbca-pro"></script>
<script>
let tbcaFoods = [];
let selectedFoodId = null;

function normalizeText(v){
  return String(v||'').normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').toLowerCase().trim();
}
function n(v){ return Number(v ?? 0) || 0; }
function fmtTBCA(v,d=1){ return (Number(v)||0).toLocaleString('pt-BR',{maximumFractionDigits:d,minimumFractionDigits:d}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Date.now()+Math.floor(Math.random()*99999); }
function esc(v){ return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;"); }
function jsEsc(v){ return String(v).replaceAll("\\\\","\\\\\\\\").replaceAll("'","\\\\'"); }

function foodNutrients(food){ return food?.nutrientes100g || {}; }
function measureNutrients(measure){ return measure?.nutrientes || {}; }

function scaleNutrients(base, qty){
  const out = {};
  Object.keys(base || {}).forEach(k => out[k] = n(base[k]) * qty);
  return out;
}

function foodMeasures(food){
  const measures = Array.isArray(food?.medidas) ? food.medidas : [];
  return [
    { id:'100g', nome:'100 g', rotulo:'100 g', quantidade:100, unidade:'g', nutrientes:foodNutrients(food), is100g:true },
    ...measures.map((m,idx)=>({
      id:m.id || ('m'+idx),
      nome:m.nome || m.rotulo || ('Medida '+(idx+1)),
      rotulo:m.rotulo || m.nome || ('Medida '+(idx+1)),
      quantidade:m.quantidade,
      unidade:m.unidade,
      nutrientes:measureNutrients(m),
      is100g:false
    }))
  ];
}

async function loadTBCA(){
  const status = document.getElementById('tbcaStatus');
  try{
    const r = await fetch('./tbca_pronto.json',{cache:'no-store'});
    if(!r.ok) throw new Error('tbca_pronto não encontrado');
    const json = await r.json();
    tbcaFoods = Array.isArray(json) ? json : (json.alimentos || []);
    tbcaFoods = tbcaFoods.filter(f=>f && f.nome);
    status.textContent = `Base TBCA carregada: ${tbcaFoods.length} alimentos. Ex.: ${tbcaFoods[0]?.nome || ''}`;
    populateGroups();
    renderFoodsTBCA();
  }catch(e){
    status.textContent = 'Não encontrei tbca_pronto.json. Rode converter_tbca.py e coloque tbca_pronto.json nesta pasta.';
    document.getElementById('foodList').innerHTML = '<div class="empty">tbca_pronto.json não encontrado.</div>';
  }
}

function populateGroups(){
  const sel = document.getElementById('groupFood');
  const groups = [...new Set(tbcaFoods.map(f=>f.grupo).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  sel.innerHTML = '<option value="">Todos os grupos</option>' + groups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
}

function renderFoodsTBCA(){
  const q = normalizeText(document.getElementById('qFood').value);
  const group = document.getElementById('groupFood').value;
  const sort = document.getElementById('sortFood').value;

  let list = tbcaFoods.filter(f=>{
    const txt = normalizeText([f.nome,f.descricao,f.grupo,f.tipo_alimento,f.codigo].join(' '));
    return txt.includes(q) && (!group || f.grupo === group);
  });

  list.sort((a,b)=>{
    const A = foodNutrients(a), B = foodNutrients(b);
    if(sort==='kcal') return n(A.kcal) - n(B.kcal);
    if(sort==='proteina') return n(B.proteina) - n(A.proteina);
    if(sort==='carbo') return n(B.carbo) - n(A.carbo);
    if(sort==='fibra') return n(B.fibra) - n(A.fibra);
    if(sort==='colesterol') return n(B.colesterol) - n(A.colesterol);
    return String(a.nome).localeCompare(String(b.nome),'pt-BR');
  });

  const el = document.getElementById('foodList');

  if(!list.length){
    el.innerHTML = '<div class="empty">Nenhum alimento encontrado.</div>';
    return;
  }

  el.innerHTML = list.slice(0,120).map(f=>{
    const nut = foodNutrients(f);
    return `<article class="card food-card">
      <div>
        <h3>${esc(f.nome)}</h3>
        <p class="subtitle">${esc(f.grupo || '')}</p>
      </div>

      <div class="food-meta">
        <span class="pill">${esc(f.tipo_alimento || 'TBCA')}</span>
        <span class="pill">${(f.medidas||[]).length} medida(s)</span>
      </div>

      <div class="tbca-nutri-mini">
        <div class="metric"><span>kcal</span><b>${fmtTBCA(nut.kcal,0)}</b></div>
        <div class="metric"><span>Prot.</span><b>${fmtTBCA(nut.proteina)}g</b></div>
        <div class="metric"><span>Carbo</span><b>${fmtTBCA(nut.carbo)}g</b></div>
        <div class="metric"><span>Gord.</span><b>${fmtTBCA(nut.gordura)}g</b></div>
      </div>

      <div class="food-actions">
        <button class="primary" onclick="showFoodDetail('${jsEsc(f.id)}')">Ver detalhes</button>
        <button class="ghost" onclick="openAddFoodModal('${jsEsc(f.id)}')">Adicionar ao diário</button>
      </div>
    </article>`;
  }).join('');
}

function findFood(id){ return tbcaFoods.find(f => String(f.id) === String(id)); }

function clearFoodFilters(){
  document.getElementById('qFood').value = '';
  document.getElementById('groupFood').value = '';
  document.getElementById('sortFood').value = 'nome';
  renderFoodsTBCA();
}

function showFoodDetail(id){
  const f = findFood(id);
  if(!f) return;

  const nut = foodNutrients(f);
  const measures = foodMeasures(f).filter(m=>!m.is100g);

  const content = `
    <div class="tbca-detail-header">
      <div>
        <h2 style="margin:0 0 6px">${esc(f.nome)}</h2>
        <p class="subtitle" style="margin:0">${esc(f.grupo || '')}</p>
        <div class="food-meta" style="margin-top:12px">
          <span class="pill">${esc(f.codigo || 'TBCA')}</span>
          <span class="pill">${esc(f.tipo_alimento || '')}</span>
          <span class="pill">${measures.length} medida(s)</span>
        </div>
      </div>
      <button class="tbca-close" onclick="closeFoodDetail()">×</button>
    </div>

    <div class="tbca-nutri-mini" style="margin-bottom:16px">
      <div class="metric"><span>kcal</span><b>${fmtTBCA(nut.kcal,0)}</b></div>
      <div class="metric"><span>Proteína</span><b>${fmtTBCA(nut.proteina)}g</b></div>
      <div class="metric"><span>Carbo</span><b>${fmtTBCA(nut.carbo)}g</b></div>
      <div class="metric"><span>Gordura</span><b>${fmtTBCA(nut.gordura)}g</b></div>
    </div>

    <div class="tbca-detail-grid">
      <section class="tbca-modal-section">
        <h3>Nutrientes por 100g</h3>
        ${nutritionTable(nut)}
      </section>

      <section class="tbca-modal-section">
        <h3>Medidas caseiras</h3>
        <div class="tbca-measures">
          ${measures.length ? measures.slice(0,12).map(m=>{
            const mn = m.nutrientes;
            return `<div class="tbca-measure">
              <div class="tbca-measure-head">
                <span>${esc(m.rotulo)}</span>
                <span>${fmtTBCA(mn.kcal,0)} kcal</span>
              </div>
              <small class="subtitle">Prot. ${fmtTBCA(mn.proteina)}g • Carbo ${fmtTBCA(mn.carbo)}g • Gord. ${fmtTBCA(mn.gordura)}g</small>
            </div>`;
          }).join('') : '<div class="empty">Sem medidas caseiras cadastradas para este alimento.</div>'}
        </div>
      </section>
    </div>

    <div class="food-actions" style="margin-top:16px">
      <button class="primary" onclick="openAddFoodModal('${jsEsc(f.id)}')">Adicionar ao diário</button>
      <button class="ghost" onclick="closeFoodDetail()">Fechar</button>
    </div>
  `;

  document.getElementById('foodDetailModalContent').innerHTML = content;
  document.getElementById('foodDetailModal').classList.add('open');
}

function closeFoodDetail(){
  document.getElementById('foodDetailModal').classList.remove('open');
}

function nutritionTable(nut){
  return `<div class="table-wrap tbca-table"><table>
    <thead><tr><th>Nutriente</th><th>Total</th></tr></thead>
    <tbody>
      <tr><td>Energia</td><td>${fmtTBCA(nut.kcal,0)} kcal</td></tr>
      <tr><td>Proteínas</td><td>${fmtTBCA(nut.proteina)} g</td></tr>
      <tr><td>Carboidratos</td><td>${fmtTBCA(nut.carbo)} g</td></tr>
      <tr><td>Gorduras</td><td>${fmtTBCA(nut.gordura)} g</td></tr>
      <tr><td>Fibras</td><td>${fmtTBCA(nut.fibra)} g</td></tr>
      <tr><td>Cálcio</td><td>${fmtTBCA(nut.calcio)} mg</td></tr>
      <tr><td>Ferro</td><td>${fmtTBCA(nut.ferro)} mg</td></tr>
      <tr><td>Sódio</td><td>${fmtTBCA(nut.sodio)} mg</td></tr>
      <tr><td>Colesterol</td><td>${fmtTBCA(nut.colesterol)} mg</td></tr>
      <tr><td>Vitamina C</td><td>${fmtTBCA(nut.vitc)} mg</td></tr>
      <tr><td>Zinco</td><td>${fmtTBCA(nut.zinco)} mg</td></tr>
    </tbody>
  </table></div>`;
}

function openAddFoodModal(id){
  const f = findFood(id);
  if(!f) return;

  selectedFoodId = id;
  document.getElementById('modalFoodName').textContent = f.nome;
  document.getElementById('modalDate').value = todayISO();

  const sel = document.getElementById('modalMeasure');
  const measures = foodMeasures(f);
  sel.innerHTML = measures.map(m => `<option value="${m.id}">${esc(m.rotulo)}</option>`).join('');
  document.getElementById('modalQty').value = '1';

  updateModalPreview();
  document.getElementById('addFoodModal').classList.add('open');
}

function closeAddFoodModal(){
  selectedFoodId = null;
  document.getElementById('addFoodModal').classList.remove('open');
}

function selectedMeasure(){
  const f = findFood(selectedFoodId);
  if(!f) return null;
  const id = document.getElementById('modalMeasure').value;
  return foodMeasures(f).find(m=>m.id===id);
}

function updateModalPreview(){
  const m = selectedMeasure();
  if(!m) return;
  const qty = Math.max(0, n(document.getElementById('modalQty').value) || 1);
  const nut = scaleNutrients(m.nutrientes, qty);
  document.getElementById('modalPreview').innerHTML = `
    <b>${esc(m.rotulo)}</b> × ${fmtTBCA(qty)}
    <div class="tbca-nutri-mini" style="margin-top:10px">
      <div class="metric"><span>kcal</span><b>${fmtTBCA(nut.kcal,0)}</b></div>
      <div class="metric"><span>Prot.</span><b>${fmtTBCA(nut.proteina)}g</b></div>
      <div class="metric"><span>Carbo</span><b>${fmtTBCA(nut.carbo)}g</b></div>
      <div class="metric"><span>Gord.</span><b>${fmtTBCA(nut.gordura)}g</b></div>
    </div>
  `;
}

function confirmAddTBCA(meal){
  const f = findFood(selectedFoodId);
  const m = selectedMeasure();
  if(!f || !m) return;

  const qty = Math.max(0, n(document.getElementById('modalQty').value) || 1);
  const nut = scaleNutrients(m.nutrientes, qty);

  const diary = JSON.parse(localStorage.getItem('nv_diary') || '[]');
  diary.push({
    id: uid(),
    tipo: 'tbca',
    foodId: 'tbca_' + f.id + '_' + m.id,
    food:{
      id: 'tbca_' + f.id + '_' + m.id,
      nome: `${f.nome} — ${m.rotulo} × ${fmtTBCA(qty)}`,
      kcal:nut.kcal,
      proteina:nut.proteina,
      carbo:nut.carbo,
      gordura:nut.gordura,
      fibra:nut.fibra,
      calcio:nut.calcio,
      ferro:nut.ferro,
      sodio:nut.sodio,
      colesterol:nut.colesterol,
      vitc:nut.vitc,
      retinol:nut.retinol,
      zinco:nut.zinco
    },
    meal,
    grams:100,
    when:document.getElementById('modalDate').value || todayISO(),
    tbca:{
      codigo:f.codigo,
      medida:m.rotulo,
      quantidade:qty,
      unidade:m.unidade,
      quantidade_medida:m.quantidade
    }
  });

  localStorage.setItem('nv_diary', JSON.stringify(diary));
  closeAddFoodModal();

  if(confirm('Alimento adicionado ao diário! Deseja abrir o Hoje agora?')){
    location.href = 'index.html';
  }
}

document.addEventListener('keydown', function(ev){
  if(ev.key === 'Escape'){
    closeFoodDetail();
    closeAddFoodModal();
  }
});

document.addEventListener('click', function(ev){
  const d = document.getElementById('foodDetailModal');
  const a = document.getElementById('addFoodModal');
  if(ev.target === d) closeFoodDetail();
  if(ev.target === a) closeAddFoodModal();
});

loadTBCA();
</script>
</body>
</html>
