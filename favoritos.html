<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NutriVida - Favoritos</title><link rel="stylesheet" href="app.css"></head><body><header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html"><span class="logo">🌿</span>NutriVida</a><nav class="desktop-nav"><a class="navbtn" href="index.html">Hoje</a><a class="navbtn" href="alimentos.html">Alimentos</a><a class="navbtn" href="receitas.html">Receitas</a><a class="navbtn active" href="favoritos.html">Favoritos</a></nav></div></header><main class="app"><section class="card soft"><h1 class="title">Favoritos</h1><p class="subtitle">Alimentos marcados com estrela aparecem aqui para lançamento rápido.</p></section><div id="favList" class="grid"></div></main><nav class="bottom-nav"><div class="bottom-nav-inner"><button onclick="location.href='index.html'">🏠<br>Hoje</button><button onclick="location.href='alimentos.html'">🍎<br>Alimentos</button><button onclick="location.href='receitas.html'">📖<br>Receitas</button></div></nav><div class="modal-back" id="addModal"><div class="modal"><div class="modal-head"><h2>Adicionar alimento</h2><button class="close" onclick="closeAdd()">Fechar</button></div><div class="formrow"><div class="field"><label>Alimento</label><select id="modalFood"></select></div><div class="field"><label>Refeição</label><select id="modalMeal"><option>Café da manhã</option><option>Almoço</option><option>Lanche</option><option>Jantar</option></select></div></div><div class="field"><label>Quantidade em gramas</label><input id="modalGrams" type="number" value="100"></div><div class="toolbar"><button class="primary" onclick="submitAdd();renderFavs()">Adicionar ao diário</button></div></div></div><script src="app.js"></script><script>
function renderFavs(){const arr=NV.foods.filter(f=>NV.favs.includes(String(f.id)));document.getElementById('favList').innerHTML=arr.map(f=>`<div class="food-card"><div><h3>${f.nome}</h3><div class="food-meta"><span>${f.grupo}</span><span>${fmt(f.kcal)} kcal</span><span>${fmt(f.proteina,1)}g proteína</span></div></div><div class="toolbar"><button class="ghost" onclick="toggleFav('${f.id}')">Remover</button><button class="primary" onclick="openAdd('Almoço');document.getElementById('modalFood').value='${f.id}'">Adicionar</button></div></div>`).join('')||'<div class="empty">Você ainda não marcou favoritos.</div>'}
loadFoods().then(()=>{NV.foods=NV.foods.map(f=>({...f,id:String(f.id)}));fillFoodSelect();renderFavs()})</script></body></html>
