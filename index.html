<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTACO Dashboard</title>

<style>
/* MANTIVE SEU CSS ORIGINAL + AJUSTES */
:root{
  --bg:#f6f7f9;
  --card:#ffffff;
  --line:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#2f8f46;
  --primary-soft:#eaf6ed;
  --blue-soft:#eef4ff;
  --amber-soft:#fff8eb;
  --red-soft:#fff1f2;
  --violet-soft:#f5f3ff;
  --shadow:0 10px 24px rgba(15,23,42,.06);
  --radius:18px;
}

body{margin:0;font-family:Arial;background:var(--bg);}

.hidden{display:none!important;}

.tela{
  max-width:1400px;
  margin:20px auto;
  padding:0 16px;
}

.topbar{
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  position:sticky;
  top:0;
}

.topbar-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
}

.btn-outline{
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  background:#fff;
}

/* resto do css continua igual... */
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <h2 style="color:#2f8f46">NutriTACO</h2>

    <div style="display:flex;gap:10px;">
      <button class="btn-outline" onclick="trocarTela('dashboard')">Dashboard</button>
      <button class="btn-outline" onclick="trocarTela('alimentos')">Alimentos</button>
      <button class="btn-outline" onclick="trocarTela('diario')">Diário</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tela">
  <h2>Resumo</h2>
  <p>Aqui ficam seus indicadores (IMC, metas, progresso etc).</p>
</div>

<!-- ALIMENTOS -->
<div id="alimentos" class="tela hidden">

  <h2>Buscar alimentos</h2>

  <input id="busca" placeholder="Buscar..." style="width:100%;padding:10px;margin-bottom:10px;">

  <select id="grupoSelect" style="width:100%;padding:10px;margin-bottom:10px;"></select>

  <div id="listaAlimentos"></div>

</div>

<!-- DIARIO -->
<div id="diario" class="tela hidden">

  <h2>Diário alimentar</h2>

  <div id="refeicoes"></div>

</div>

<script>

/* =========================
   NAVEGAÇÃO ENTRE TELAS
========================= */

function trocarTela(tela){
  document.querySelectorAll(".tela").forEach(t=>t.classList.add("hidden"));
  document.getElementById(tela).classList.remove("hidden");
}

/* =========================
   BASE (SIMPLIFICADA)
========================= */

let baseAtual = [];

async function carregarBase(){
  const res = await fetch("taco_completo.json");
  const data = await res.json();
  baseAtual = data.alimentos || data;
  preencherGrupos();
  aplicarFiltro();
}

function preencherGrupos(){
  const grupos = [...new Set(baseAtual.map(a => a.grupo || "Outros"))];

  const select = document.getElementById("grupoSelect");

  select.innerHTML = `<option value="todos">Todos</option>` +
    grupos.map(g=>`<option value="${g}">${g}</option>`).join("");
}

/* =========================
   FILTRO
========================= */

function aplicarFiltro(){
  const termo = document.getElementById("busca").value.toLowerCase();
  const grupo = document.getElementById("grupoSelect").value;

  let lista = baseAtual.filter(a=>{
    const nome = (a.descricao_alimento||"").toLowerCase();
    const g = a.grupo || "Outros";

    return (!termo || nome.includes(termo)) &&
           (grupo === "todos" || g === grupo);
  });

  renderLista(lista.slice(0,100));
}

function renderLista(lista){
  const div = document.getElementById("listaAlimentos");

  div.innerHTML = lista.map(a=>`
    <div style="padding:10px;border-bottom:1px solid #eee;">
      ${a.descricao_alimento}
    </div>
  `).join("");
}

/* =========================
   EVENTOS
========================= */

document.getElementById("busca").addEventListener("input", aplicarFiltro);
document.getElementById("grupoSelect").addEventListener("change", aplicarFiltro);

/* =========================
   INIT
========================= */

carregarBase();

</script>

</body>
</html>
