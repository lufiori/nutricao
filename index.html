<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriVida - Nova Home</title>

<style>
:root{
  --bg:#f6f7f5;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
  --green:#22c55e;
  --green2:#15803d;
  --soft:#f3f7f2;
  --shadow:0 8px 20px rgba(15,23,42,.06);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.nv-home{
  width:100%;
  max-width:430px;
  margin:0 auto;
  padding:18px;
  min-height:100vh;
}

.nv-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.nv-top h1{
  margin:0;
  font-size:30px;
  line-height:1;
}

.nv-top p{
  margin:5px 0 0;
  color:var(--muted);
  font-size:14px;
}

.nv-calendar-btn{
  width:48px;
  height:48px;
  border-radius:17px;
  border:1px solid var(--line);
  background:#fff;
  font-size:21px;
  box-shadow:var(--shadow);
}

.nv-summary-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:26px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}

.nv-summary-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.nv-summary-header h2{
  margin:0;
  font-size:18px;
}

.nv-summary-dots{
  display:flex;
  gap:6px;
}

.nv-summary-dots span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--green);
}

.nv-circle-wrap{
  display:grid;
  grid-template-columns:72px 1fr 72px;
  align-items:center;
  gap:8px;
}

.nv-kcal-left,
.nv-kcal-right{
  text-align:center;
}

.nv-kcal-left strong,
.nv-kcal-right strong{
  display:block;
  font-size:20px;
}

.nv-kcal-left span,
.nv-kcal-right span{
  font-size:12px;
}

.nv-circle{
  width:140px;
  height:140px;
  border-radius:50%;
  border:13px solid #f0f1ef;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  position:relative;
}

.nv-circle:after{
  content:"";
  position:absolute;
  left:-13px;
  bottom:25px;
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--green);
}

.nv-circle-inner{
  text-align:center;
}

.nv-circle-inner strong{
  display:block;
  font-size:31px;
}

.nv-circle-inner span{
  font-size:13px;
}

.nv-macros{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:20px;
}

.nv-macro{
  text-align:center;
}

.nv-macro h3{
  font-size:12px;
  margin:0 0 8px;
  min-height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nv-macro-circle{
  width:58px;
  height:58px;
  border-radius:50%;
  border:7px solid #f0f1ef;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:10px;
  position:relative;
}

.nv-macro-circle:after{
  content:"";
  position:absolute;
  bottom:-4px;
  width:9px;
  height:9px;
  border-radius:50%;
  background:#8ee0be;
}

.nv-macro-circle strong{
  font-size:14px;
}

.nv-meals{
  display:grid;
  gap:11px;
}

.nv-meal-card{
  width:100%;
  border:1px solid var(--line);
  background:#fff;
  border-radius:18px;
  padding:13px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 14px rgba(15,23,42,.04);
  cursor:pointer;
}

.nv-meal-left{
  display:flex;
  align-items:center;
  gap:12px;
  text-align:left;
}

.nv-meal-icon{
  width:44px;
  height:44px;
  border-radius:15px;
  background:#f7f7f7;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
}

.nv-meal-card h2{
  margin:0;
  font-size:18px;
}

.nv-meal-card span{
  color:var(--muted);
  font-size:13px;
}

.nv-plus{
  width:39px;
  height:39px;
  border-radius:50%;
  background:#f1f3f1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  line-height:1;
  color:#75807a;
  flex:none;
}

.nv-sheet-back{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.42);
  display:none;
  z-index:999;
  align-items:flex-end;
  justify-content:center;
  padding:0;
}

.nv-sheet-back.open{
  display:flex;
}

.nv-sheet{
  width:100%;
  max-width:500px;
  background:#fff;
  border-radius:26px 26px 0 0;
  padding:18px;
  max-height:82vh;
  overflow:auto;
  box-shadow:0 -20px 60px rgba(15,23,42,.20);
}

.nv-sheet-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:14px;
}

.nv-sheet-head h2{
  margin:0;
  font-size:22px;
}

.nv-sheet-head p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

.nv-sheet-head button{
  border:none;
  background:#f3f4f6;
  width:42px;
  height:42px;
  border-radius:14px;
  font-size:20px;
  cursor:pointer;
}

.nv-food-search{
  width:100%;
  padding:14px;
  border-radius:17px;
  border:1px solid var(--line);
  margin-bottom:12px;
  font-size:15px;
  outline:none;
}

.nv-food-search:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(34,197,94,.12);
}

.nv-source-row{
  display:flex;
  gap:8px;
  margin-bottom:12px;
  overflow-x:auto;
  padding-bottom:2px;
}

.nv-source-row button{
  border:1px solid var(--line);
  background:#f9fafb;
  padding:8px 11px;
  border-radius:999px;
  font-weight:700;
  font-size:12px;
  cursor:pointer;
  white-space:nowrap;
}

.nv-source-row button.active{
  background:#dcfce7;
  border-color:#bbf7d0;
  color:#15803d;
}

.nv-food-list{
  display:grid;
  gap:8px;
}

.nv-food-item{
  border:1px solid #eef0f2;
  background:#f9fafb;
  border-radius:16px;
  padding:12px;
  text-align:left;
  cursor:pointer;
}

.nv-food-item:hover{
  background:#f3f4f6;
}

.nv-food-item strong{
  display:block;
  margin-bottom:4px;
  font-size:14px;
}

.nv-food-item span{
  color:var(--muted);
  font-size:12px;
}

.nv-empty{
  background:#f9fafb;
  border:1px dashed #d1d5db;
  color:#6b7280;
  border-radius:16px;
  padding:16px;
  text-align:center;
  font-size:13px;
}

.nv-selected{
  display:none;
  background:#f0fdf4;
  border:1px solid #bbf7d0;
  color:#14532d;
  border-radius:17px;
  padding:12px;
  margin:12px 0;
}

.nv-selected.open{
  display:block;
}

.nv-selected strong{
  display:block;
  margin-bottom:4px;
}

.nv-add-row{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:10px;
  margin-top:10px;
}

.nv-add-row input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
}

.nv-add-btn{
  border:none;
  border-radius:14px;
  background:#16a34a;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.nv-add-btn:disabled{
  background:#d1d5db;
  cursor:not-allowed;
}

@media(min-width:800px){
  .nv-sheet-back{
    align-items:center;
    padding:20px;
  }

  .nv-sheet{
    border-radius:26px;
    max-height:82vh;
  }
}
</style>
</head>

<body>

<section class="nv-home">

  <div class="nv-top">
    <div>
      <h1>Hoje</h1>
      <p>Seu resumo alimentar diário</p>
    </div>

    <button class="nv-calendar-btn">📅</button>
  </div>

  <section class="nv-summary-card">

    <div class="nv-summary-header">
      <h2>Resumo</h2>

      <div class="nv-summary-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="nv-circle-wrap">

      <div class="nv-kcal-left">
        <strong id="metaKcal">1530</strong>
        <span>Meta</span>
      </div>

      <div class="nv-circle">
        <div class="nv-circle-inner">
          <strong id="consumidoKcal">0</strong>
          <span>Consumido</span>
        </div>
      </div>

      <div class="nv-kcal-right">
        <strong>0</strong>
        <span>Queimado</span>
      </div>

    </div>

    <div class="nv-macros">

      <div class="nv-macro">
        <h3>Proteína</h3>
        <div class="nv-macro-circle"><strong id="protTotal">0</strong><span>/100g</span></div>
      </div>

      <div class="nv-macro">
        <h3>Gordura</h3>
        <div class="nv-macro-circle"><strong id="gordTotal">0</strong><span>/115g</span></div>
      </div>

      <div class="nv-macro">
        <h3>Carbo</h3>
        <div class="nv-macro-circle"><strong id="carboTotal">0</strong><span>/240g</span></div>
      </div>

      <div class="nv-macro">
        <h3>Fibra</h3>
        <div class="nv-macro-circle"><strong id="fibraTotal">0</strong><span>/21g</span></div>
      </div>

    </div>

  </section>

  <section class="nv-meals">

    <button class="nv-meal-card" onclick="openMealSheet('Café da manhã')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🥐</div>
        <div><h2>Café da manhã</h2><span id="mealCafe">0 kcal</span></div>
      </div>
      <div class="nv-plus">+</div>
    </button>

    <button class="nv-meal-card" onclick="openMealSheet('Almoço')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🍝</div>
        <div><h2>Almoço</h2><span id="mealAlmoco">0 kcal</span></div>
      </div>
      <div class="nv-plus">+</div>
    </button>

    <button class="nv-meal-card" onclick="openMealSheet('Jantar')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🥘</div>
        <div><h2>Jantar</h2><span id="mealJantar">0 kcal</span></div>
      </div>
      <div class="nv-plus">+</div>
    </button>

    <button class="nv-meal-card" onclick="openMealSheet('Lanches')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🍿</div>
        <div><h2>Lanches</h2><span id="mealLanches">0 kcal</span></div>
      </div>
      <div class="nv-plus">+</div>
    </button>

  </section>

</section>

<div class="nv-sheet-back" id="mealSheet" onclick="if(event.target.id==='mealSheet') closeMealSheet()">

  <div class="nv-sheet">

    <div class="nv-sheet-head">
      <div>
        <h2 id="sheetMealTitle">Adicionar alimento</h2>
        <p id="sheetStatus">Busque ou escolha uma sugestão rápida</p>
      </div>

      <button onclick="closeMealSheet()">✕</button>
    </div>

    <input
      type="text"
      id="foodSearch"
      class="nv-food-search"
      placeholder="Buscar alimento..."
      oninput="renderFoodList()"
    >

    <div class="nv-source-row">
      <button id="filterTodos" class="active" onclick="setTipoFiltro('todos')">Todos</button>
      <button id="filterSimples" onclick="setTipoFiltro('simples')">Ingredientes simples</button>
      <button id="filterPreparados" onclick="setTipoFiltro('preparados')">Preparados</button>
    </div>

    <div id="foodList" class="nv-food-list">
      <div class="nv-empty">Carregando alimentos...</div>
    </div>

    <div id="selectedBox" class="nv-selected"></div>

    <div class="nv-add-row">
      <input id="gramsInput" type="number" value="100" min="1">
      <button id="addBtn" class="nv-add-btn" onclick="addSelectedFood()" disabled>Adicionar</button>
    </div>

  </div>

</div>

<script>
const TBCA_URLS = ["./tbca_pronto.json", "./tbca.json", "./alimentos_tbca.json"];
const TACO_URL = "./taco.json";

let alimentos = [];
let selectedFood = null;
let currentMeal = "Almoço";
let tipoFiltro = "todos";

let diario = JSON.parse(localStorage.getItem("nutrivida_home_diario") || "[]");

function norm(t){
  return String(t || "").normalize("NFD").replace(/[\\u0300-\\u036f]/g,"").toLowerCase().trim();
}

function num(v){
  if(v === null || v === undefined || v === "" || v === "NA" || v === "Tr") return 0;
  const n = parseFloat(String(v).replace(",", ".").replace(/[^\\d.-]/g,""));
  return Number.isFinite(n) ? n : 0;
}

function fmt(v){
  return num(v).toLocaleString("pt-BR", {maximumFractionDigits: 0});
}

function arr(json){
  if(Array.isArray(json)) return json;
  if(Array.isArray(json.alimentos)) return json.alimentos;
  if(Array.isArray(json.data)) return json.data;
  return [];
}

function mapTbca(a, i){
  const n = a.nutrientes100g || {};
  const nome = a.nome || a.descricao || "Sem nome";
  return {
    id: "tbca_" + (a.id || a.codigo || i),
    fonte: "TBCA",
    nome,
    busca: norm(nome),
    grupo: a.grupo || "",
    tipo: a.tipo_alimento || "",
    kcal: num(n.kcal),
    proteina: num(n.proteina),
    carbo: num(n.carbo),
    gordura: num(n.gordura),
    fibra: num(n.fibra)
  };
}

function mapTaco(a, i){
  const nome = a.descricao_alimento || a.nome || "Sem nome";
  return {
    id: "taco_" + (a.numero || i),
    fonte: "TACO",
    nome,
    busca: norm(nome),
    grupo: a.grupo || "",
    tipo: "",
    kcal: num(a.energia_kcal),
    proteina: num(a.proteina_g),
    carbo: num(a.carboidrato_g),
    gordura: num(a.lipideos_g),
    fibra: num(a.fibra_alimentar_g)
  };
}

async function carregarBases(){
  let tbcaOk = false;

  for(const url of TBCA_URLS){
    try{
      const r = await fetch(url, {cache:"no-store"});
      if(!r.ok) throw new Error("status " + r.status);
      const json = await r.json();
      alimentos.push(...arr(json).map(mapTbca).filter(a => a.nome !== "Sem nome"));
      tbcaOk = true;
      break;
    }catch(e){}
  }

  try{
    const r = await fetch(TACO_URL, {cache:"no-store"});
    if(!r.ok) throw new Error("status " + r.status);
    const json = await r.json();
    alimentos.push(...arr(json).map(mapTaco).filter(a => a.nome !== "Sem nome"));
  }catch(e){}

  alimentos.sort((a,b) => a.nome.localeCompare(b.nome, "pt-BR"));

  document.getElementById("sheetStatus").textContent = alimentos.length
    ? alimentos.length + " alimentos disponíveis"
    : "Não carregou os alimentos. Confira tbca_pronto.json e taco.json.";

  renderFoodList();
  renderResumo();
}


function prioridadeInicial(a){
  const n = norm(a.nome);
  const prioridades = [
    "arroz", "feijao", "frango", "ovo", "banana", "pao", "leite", "cafe",
    "batata", "macarrao", "carne", "alface", "tomate", "maca", "aveia"
  ];

  const idx = prioridades.findIndex(p => n.includes(p));
  return idx === -1 ? 999 : idx;
}

function parecePreparado(a){
  const t = norm((a.nome || "") + " " + (a.grupo || "") + " " + (a.tipo || ""));

  return t.includes("preparacao") ||
         t.includes("preparação") ||
         t.includes("preparado") ||
         t.includes("cozido") ||
         t.includes("assado") ||
         t.includes("frito") ||
         t.includes("grelhado") ||
         t.includes("refogado") ||
         t.includes("molho") ||
         t.includes("sopa") ||
         t.includes("bolo") ||
         t.includes("bife") ||
         t.includes("estrogonofe") ||
         t.includes("salada") ||
         t.includes("cuscuz") ||
         t.includes("feijoada");
}

function setTipoFiltro(tipo){
  tipoFiltro = tipo;

  document.querySelectorAll(".nv-source-row button").forEach(b => b.classList.remove("active"));

  if(tipo === "todos") document.getElementById("filterTodos").classList.add("active");
  if(tipo === "simples") document.getElementById("filterSimples").classList.add("active");
  if(tipo === "preparados") document.getElementById("filterPreparados").classList.add("active");

  renderFoodList();
}

function renderFoodList(){
  const termo = norm(document.getElementById("foodSearch").value);
  const box = document.getElementById("foodList");

  let lista = alimentos.filter(a => {
    const okBusca = !termo || a.busca.includes(termo);
    let okTipo = true;

    if(tipoFiltro === "simples") okTipo = !parecePreparado(a);
    if(tipoFiltro === "preparados") okTipo = parecePreparado(a);

    return okBusca && okTipo;
  });

  if(!termo){
    lista.sort((a,b) => {
      const pa = prioridadeInicial(a);
      const pb = prioridadeInicial(b);
      if(pa !== pb) return pa - pb;
      return a.nome.localeCompare(b.nome, "pt-BR");
    });
  }

  lista = lista.slice(0, 40);

  if(!lista.length){
    box.innerHTML = '<div class="nv-empty">Nenhum alimento encontrado.</div>';
    return;
  }

  box.innerHTML = lista.map(a => `
    <button class="nv-food-item" onclick="selectFood('${a.id}')">
      <strong>${a.nome}</strong>
      <span>${fmt(a.kcal)} kcal • ${a.fonte === "TBCA" ? "base principal" : "base complementar"}</span>
    </button>
  `).join("");
}

function selectFood(id){
  selectedFood = alimentos.find(a => String(a.id) === String(id));

  if(!selectedFood) return;

  const box = document.getElementById("selectedBox");
  box.classList.add("open");
  box.innerHTML = `
    <strong>${selectedFood.nome}</strong>
    ${fmt(selectedFood.kcal)} kcal por 100g • ${selectedFood.fonte === "TBCA" ? "base principal" : "base complementar"}
  `;

  document.getElementById("addBtn").disabled = false;
}

function openMealSheet(meal){
  currentMeal = meal;
  selectedFood = null;

  document.getElementById("sheetMealTitle").innerText = meal;
  document.getElementById("mealSheet").classList.add("open");
  document.getElementById("foodSearch").value = "";
  document.getElementById("selectedBox").classList.remove("open");
  document.getElementById("addBtn").disabled = true;

  setTimeout(() => document.getElementById("foodSearch").focus(), 150);
  renderFoodList();
}

function closeMealSheet(){
  document.getElementById("mealSheet").classList.remove("open");
}

function addSelectedFood(){
  if(!selectedFood) return;

  const gramas = Math.max(1, num(document.getElementById("gramsInput").value) || 100);
  const fator = gramas / 100;

  diario.push({
    refeicao: currentMeal,
    nome: selectedFood.nome,
    fonte: selectedFood.fonte,
    gramas,
    kcal: selectedFood.kcal * fator,
    proteina: selectedFood.proteina * fator,
    carbo: selectedFood.carbo * fator,
    gordura: selectedFood.gordura * fator,
    fibra: selectedFood.fibra * fator
  });

  localStorage.setItem("nutrivida_home_diario", JSON.stringify(diario));
  renderResumo();
  closeMealSheet();
}

function soma(campo, refeicao){
  return diario
    .filter(i => !refeicao || i.refeicao === refeicao)
    .reduce((t,i) => t + num(i[campo]), 0);
}

function renderResumo(){
  document.getElementById("consumidoKcal").textContent = fmt(soma("kcal"));
  document.getElementById("protTotal").textContent = fmt(soma("proteina"));
  document.getElementById("gordTotal").textContent = fmt(soma("gordura"));
  document.getElementById("carboTotal").textContent = fmt(soma("carbo"));
  document.getElementById("fibraTotal").textContent = fmt(soma("fibra"));

  document.getElementById("mealCafe").textContent = fmt(soma("kcal", "Café da manhã")) + " kcal";
  document.getElementById("mealAlmoco").textContent = fmt(soma("kcal", "Almoço")) + " kcal";
  document.getElementById("mealJantar").textContent = fmt(soma("kcal", "Jantar")) + " kcal";
  document.getElementById("mealLanches").textContent = fmt(soma("kcal", "Lanches")) + " kcal";
}

document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeMealSheet();
});

carregarBases();
</script>

</body>
</html>
