<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriVida - Nova Home</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f5f5;
  color:#111827;
}

.nv-home{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.nv-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.nv-top h1{
  margin:0;
  font-size:34px;
}

.nv-top p{
  margin:4px 0 0;
  color:#6b7280;
}

.nv-calendar-btn{
  width:52px;
  height:52px;
  border-radius:18px;
  border:none;
  background:#fff;
  font-size:22px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.nv-summary-card{
  background:#fff;
  border-radius:28px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.nv-summary-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nv-summary-header h2{
  margin:0;
}

.nv-summary-dots{
  display:flex;
  gap:6px;
}

.nv-summary-dots span{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
}

.nv-circle-wrap{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:22px;
}

.nv-circle{
  width:170px;
  height:170px;
  border-radius:50%;
  border:14px solid #f0f0f0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nv-circle-inner{
  text-align:center;
}

.nv-circle-inner strong{
  display:block;
  font-size:42px;
}

.nv-kcal-left,
.nv-kcal-right{
  text-align:center;
}

.nv-kcal-left strong,
.nv-kcal-right strong{
  display:block;
  font-size:24px;
}

.nv-macros{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:22px;
}

.nv-macro{
  text-align:center;
}

.nv-macro h3{
  font-size:13px;
  margin-bottom:8px;
}

.nv-macro-circle{
  width:66px;
  height:66px;
  border-radius:50%;
  border:8px solid #f0f0f0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:11px;
}

.nv-meals{
  display:grid;
  gap:14px;
}

.nv-meal-card{
  width:100%;
  border:none;
  background:#fff;
  border-radius:22px;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 6px 16px rgba(0,0,0,.05);
}

.nv-meal-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.nv-meal-icon{
  width:52px;
  height:52px;
  border-radius:18px;
  background:#f7f7f7;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

.nv-meal-card h2{
  margin:0;
  font-size:22px;
}

.nv-meal-card span{
  color:#6b7280;
}

.nv-plus{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#f3f4f6;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:#6b7280;
}

.nv-sheet-back{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:flex-end;
}

.nv-sheet-back.open{
  display:flex;
}

.nv-sheet{
  width:100%;
  background:#fff;
  border-radius:28px 28px 0 0;
  padding:20px;
  max-height:85vh;
  overflow:auto;
}

.nv-sheet-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}

.nv-sheet-head h2{
  margin:0;
}

.nv-sheet-head p{
  margin:4px 0 0;
  color:#6b7280;
}

.nv-sheet-head button{
  border:none;
  background:#f3f4f6;
  width:42px;
  height:42px;
  border-radius:14px;
  font-size:20px;
}

.nv-food-search{
  width:100%;
  padding:16px;
  border-radius:18px;
  border:1px solid #e5e7eb;
  margin-bottom:14px;
  font-size:16px;
}

.nv-food-list{
  display:grid;
  gap:10px;
}

.nv-food-item{
  border:none;
  background:#f9fafb;
  border-radius:18px;
  padding:16px;
  text-align:left;
}

.nv-food-item strong{
  display:block;
  margin-bottom:4px;
  font-size:16px;
}

.nv-food-item span{
  color:#6b7280;
}
</style>
</head>

<body>

<section class="nv-home">

  <div class="nv-top">
    <div>
      <h1>Hoje</h1>
      <p>Seu resumo alimentar diário</p>
    </div>

    <button class="nv-calendar-btn">📅</button>
  </div>

  <section class="nv-summary-card">

    <div class="nv-summary-header">
      <h2>Resumo</h2>

      <div class="nv-summary-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div class="nv-circle-wrap">

      <div class="nv-kcal-left">
        <strong>1530</strong>
        <span>Meta</span>
      </div>

      <div class="nv-circle">
        <div class="nv-circle-inner">
          <strong>0</strong>
          <span>Consumido</span>
        </div>
      </div>

      <div class="nv-kcal-right">
        <strong>0</strong>
        <span>Queimado</span>
      </div>

    </div>

    <div class="nv-macros">

      <div class="nv-macro">
        <h3>Proteína</h3>
        <div class="nv-macro-circle">
          <strong>0</strong>
          <span>/100 g</span>
        </div>
      </div>

      <div class="nv-macro">
        <h3>Gordura</h3>
        <div class="nv-macro-circle">
          <strong>0</strong>
          <span>/115 g</span>
        </div>
      </div>

      <div class="nv-macro">
        <h3>Carbo</h3>
        <div class="nv-macro-circle">
          <strong>0</strong>
          <span>/24 g</span>
        </div>
      </div>

      <div class="nv-macro">
        <h3>Fibra</h3>
        <div class="nv-macro-circle">
          <strong>0</strong>
          <span>/21 g</span>
        </div>
      </div>

    </div>

  </section>

  <section class="nv-meals">

    <button class="nv-meal-card" onclick="openMealSheet('Café da manhã')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🥐</div>

        <div>
          <h2>Café da manhã</h2>
          <span>0 kcal</span>
        </div>
      </div>

      <div class="nv-plus">+</div>
    </button>

    <button class="nv-meal-card" onclick="openMealSheet('Almoço')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🍝</div>

        <div>
          <h2>Almoço</h2>
          <span>0 kcal</span>
        </div>
      </div>

      <div class="nv-plus">+</div>
    </button>

    <button class="nv-meal-card" onclick="openMealSheet('Jantar')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🥘</div>

        <div>
          <h2>Jantar</h2>
          <span>0 kcal</span>
        </div>
      </div>

      <div class="nv-plus">+</div>
    </button>

    <button class="nv-meal-card" onclick="openMealSheet('Lanches')">
      <div class="nv-meal-left">
        <div class="nv-meal-icon">🍿</div>

        <div>
          <h2>Lanches</h2>
          <span>0 kcal</span>
        </div>
      </div>

      <div class="nv-plus">+</div>
    </button>

  </section>

</section>

<div class="nv-sheet-back" id="mealSheet">

  <div class="nv-sheet">

    <div class="nv-sheet-head">
      <div>
        <h2 id="sheetMealTitle">Adicionar alimento</h2>
        <p>Escolha um alimento rapidamente</p>
      </div>

      <button onclick="closeMealSheet()">✕</button>
    </div>

    <input
      type="text"
      class="nv-food-search"
      placeholder="Buscar alimento..."
    >

    <div class="nv-food-list">

      <button class="nv-food-item">
        <div>
          <strong>Arroz branco cozido</strong>
          <span>128 kcal • TBCA</span>
        </div>
      </button>

      <button class="nv-food-item">
        <div>
          <strong>Feijão carioca</strong>
          <span>76 kcal • TACO</span>
        </div>
      </button>

      <button class="nv-food-item">
        <div>
          <strong>Frango grelhado</strong>
          <span>163 kcal • TBCA</span>
        </div>
      </button>

    </div>

  </div>

</div>

<script>
function openMealSheet(meal){
  document.getElementById('sheetMealTitle').innerText = meal;
  document.getElementById('mealSheet').classList.add('open');
}

function closeMealSheet(){
  document.getElementById('mealSheet').classList.remove('open');
}
</script>

</body>
</html>
